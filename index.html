<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刘宇航 Yuhang Liu - 学术主页</title>
    <style>
        /* 全局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        /* 卡片容器 */
        .container {
            background: #fff;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .container:hover { transform: translateY(-5px); }

        /* 头像样式（使用首字母代替） */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #4facfe;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
            margin: 0 auto 20px;
            border: 5px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 标题与副标题 */
        h1 { font-size: 2.5em; margin-bottom: 10px; color: #2c3e50; }
        .subtitle { font-size: 1.2em; color: #7f8c8d; margin-bottom: 25px; display: block; }

        /* 信息项 */
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 15px 0;
            border-radius: 10px;
            border-left: 4px solid #4facfe;
            text-align: left;
            font-size: 1em;
            line-height: 1.6;
        }
        .info-item strong { color: #2c3e50; }

        /* 联系方式链接 */
        .contact a {
            color: #4facfe;
            text-decoration: none;
            font-weight: 500;
        }
        .contact a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头像占位符（显示姓名首字母） -->
        <div class="avatar">LYH</div>
        
        <!-- 姓名与英文名 -->
        <h1>刘宇航</h1>
        <span class="subtitle">Yuhao Liu</span>

        <!-- 学校与身份 -->
        <div class="info-item">
            <strong>🎓 身份：</strong>博士研究生<br>
            <strong>🏫 院校：</strong>北京理工大学 (BIT)<br>
            <strong>📍 地点：</strong>中国北京
        </div>

        <!-- 研究方向 -->
        <div class="info-item">
            <strong>🤖 研究方向：</strong><br>
            机器人运动规划与决策<br>
            智能控制与自主系统
        </div>

        <!-- 联系方式 -->
        <div class="info-item contact">
            <strong>📧 联系方式：</strong><br>
            邮箱：<a href="mailto:3220245204@bit.edu.cn">3220245204@bit.edu.cn</a>
        </div>

        <!-- 底部标语 -->
        <div style="margin-top: 30px; font-size: 0.9em; color: #95a5a6;">
            欢迎交流学术与合作机会！
        </div>
    </div>
</body>
</html>
